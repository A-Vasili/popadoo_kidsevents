<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="author" content="Popadoo Kids Events"/>
    <meta name="theme-color" content="#fff9fc"/>
    <meta name="description" content="Plan joyful children’s events with Popadoo Kids Events."/>
    <title>Home | Popadoo Kids Events</title>

    <script src="javascript/theme-init.js"></script>
    <link rel="icon" href="assets/svg/popadoo-logo.svg" type="image/svg+xml"/>
    <!-- Bootstrap provides the required framework grid, forms, cards, and utilities. -->
    <link rel="stylesheet" href="bootstrap/bootstrap.css"/>
    <!-- Custom CSS loads after Bootstrap so the Popadoo design system remains intact. -->
    <link rel="stylesheet" href="css/styles.css"/>
    <link rel="stylesheet" href="css/index.css"/>
</head>

<body data-page="index">
    <a class="visually-hidden-focusable" href="#main-content" data-i18n="common.skipLink">Skip to main content</a>
    <!-- Shared navigation is rendered by assets/javascript/components.js. -->
    <popadoo-header></popadoo-header>

    <main id="main-content">
        <section class="hero-carousel" aria-labelledby="welcome-heading">
            <div class="hero-carousel-slides" aria-hidden="true">
                <figure class="hero-carousel-slide hero-carousel-slide-one">
                    <img src="assets/images/carousel/party-slide-1.jpg" alt=""/>
                </figure>
                <figure class="hero-carousel-slide hero-carousel-slide-two">
                    <img src="assets/images/carousel/party-slide-2.jpg" alt=""/>
                </figure>
                <figure class="hero-carousel-slide hero-carousel-slide-three">
                    <img src="assets/images/carousel/party-slide-3.jpg" alt=""/>
                </figure>
                <figure class="hero-carousel-slide hero-carousel-slide-four">
                    <img src="assets/images/carousel/party-slide-4.jpg" alt=""/>
                </figure>
            </div>

            <div class="hero-carousel-overlay">
                <div class="container">
                    <div class="hero-carousel-content">
                        <h1 id="welcome-heading" data-i18n="home.welcomeHeading">Welcome to Popadoo Kids Events</h1>
                        <p data-i18n="home.welcomeText">Creative children’s parties planned around your family, your theme, and the venue you choose.</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="party-booking-hero" aria-labelledby="party-booking-heading">
            <img
                class="party-booking-image"
                src="assets/images/party-equipment-hero.jpg"
                alt="A colorful birthday cake, party hat, balloon, wrapped gift, ribbons, and confetti"
                data-i18n-alt="home.bookingImageAlt"
                width="1600"
                height="720"
            />
            <div class="party-booking-overlay">
                <div class="container">
                    <div class="party-booking-content">
                        <h2 id="party-booking-heading" data-i18n="home.bookingHeading">Book your next party!</h2>
                        <a class="party-booking-button" href="contact.html" data-i18n="nav.bookNow">Book Now</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- Shared footer is rendered once from the reusable component. -->
    <popadoo-footer></popadoo-footer>

    <script src="bootstrap/bootstrap.js" defer></script>
    <script src="javascript/components.js" defer></script>
    <script src="javascript/translations.js" defer></script>
    <script src="javascript/main.js" defer></script>
</body>
</html>
